    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://srikarreddy3666_db_user:SQJpRS725mUirp4C@cluster0.9ynn7vx.mongodb.net/bloodbridge?retryWrites=true&w=majority&ssl=true
