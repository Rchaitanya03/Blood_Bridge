# Use FREE email-to-SMS gateway (recommended - completely free!)
# This uses email infrastructure to send SMS via carrier gateways
# Works with: AT&T, Verizon, T-Mobile, Sprint, US Cellular, Cricket, Boost, Virgin Mobile
