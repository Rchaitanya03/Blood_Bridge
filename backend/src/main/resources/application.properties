spring.application.name=bloodbridge-backend

# MongoDB Atlas Configuration
# Note: Make sure your IP address is whitelisted in MongoDB Atlas Network Access
# If you get SSL errors, try whitelisting 0.0.0.0/0 (all IPs) temporarily for testing
spring.data.mongodb.uri=mongodb+srv://srikarreddy3666_db_user:SQJpRS725mUirp4C@cluster0.9ynn7vx.mongodb.net/bloodbridge?retryWrites=true&w=majority&ssl=true&tlsAllowInvalidHostnames=false&connectTimeoutMS=60000&socketTimeoutMS=60000&serverSelectionTimeoutMS=60000
spring.data.mongodb.database=bloodbridge
spring.data.mongodb.auto-index-creation=true
