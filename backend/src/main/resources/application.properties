# Additional MongoDB connection settings
spring.data.mongodb.option.ssl-enabled=true
spring.data.mongodb.option.ssl-invalid-host-name-allowed=false

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# JWT Configuration
jwt.secret=BloodBridgeSecretKeyForJWTTokenGeneration2024SecureKeyReplaceThisWithASecureRandomStringInProduction
jwt.expiration=86400000

# Google OAuth2 Configuration
# Get credentials from: https://console.cloud.google.com/
# Step-by-step guide: See GOOGLE_OAUTH_SETUP.md
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

# OAuth2 Provider Configuration (usually auto-configured, but explicit for clarity)
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# n8n Webhook Configuration (Optional)
# Set this to your n8n webhook URL to enable automated notifications
