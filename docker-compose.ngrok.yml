# Docker Compose with ngrok integration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.ngrok.yml up -d

version: '3.8'

services:
  # ngrok service for frontend
  ngrok-frontend:
    image: ngrok/ngrok:latest
    container_name: ngrok-frontend
    command: http frontend:80 --authtoken=${NGROK_AUTH_TOKEN}
    ports:
      - "4040:4040"  # ngrok web interface
    depends_on:
      - frontend
    networks:
      - bloodbridge-network
    restart: unless-stopped

  # ngrok service for backend
  ngrok-backend:
    image: ngrok/ngrok:latest
    container_name: ngrok-backend
    command: http backend:8081 --authtoken=${NGROK_AUTH_TOKEN}
    ports:
      - "4041:4040"  # ngrok web interface
    depends_on:
      - backend
    networks:
      - bloodbridge-network
    restart: unless-stopped

networks:
  bloodbridge-network:
    external: true

